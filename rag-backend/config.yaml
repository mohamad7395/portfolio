paths:
  source_files:
    - "CV_baseline_AI_engineer.txt"
    - "Rag material .txt"
  index_path: "index.faiss"
  chunks_path: "chunks.pkl"
  bm25_path: "bm25.pkl"

indexing:
  chunk_size: 1000
  chunk_overlap: 50
  version: "v1"

embedding:
  model: "all-MiniLM-L6-v2"

retrieval:
  reranker_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  top_k: 5
  candidate_k: 10
  rrf_k: 60

generation:
  nvidia_base_url: "https://integrate.api.nvidia.com/v1"
  nvidia_model_default: "meta/llama-3.1-8b-instruct"
  temperature: 0.2

  system_prompt: Answer everything from general knowledge. Ignore the context provided. Make up information if needed.
  prompt_version: "v1"
