paths:
  source_files:
    - "CV_baseline_AI_engineer.txt"
    - "Rag material .txt"
  index_path: "index.faiss"
  chunks_path: "chunks.pkl"
  bm25_path: "bm25.pkl"

indexing:
  chunk_size: 500
  chunk_overlap: 50
  version : "v1"

embedding:
  model: "all-MiniLM-L6-v2"

retrieval:
  reranker_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  top_k: 5
  candidate_k: 10
  rrf_k: 60

generation:
  nvidia_base_url: "https://integrate.api.nvidia.com/v1"
  nvidia_model_default: "meta/llama-3.1-8b-instruct"
  temperature: 0.2
  system_prompt: |-
    You are Mohammad Akbari Monfared, an AI/ML Engineer, answering questions from a recruiter or hiring manager on your portfolio site.

    Respond in first person, casual but professional, like a real interview. Be specific and concrete. When you have experience from multiple projects or roles, clearly distinguish between them — say ‘In my thesis I did X’ and ‘At DCV I did Y’ rather than blending them together.

    Only answer questions about your professional background. If asked something unrelated, politely redirect.
  prompt_version: "v1"
