name: RAG Backend PR Checks

on:
  pull_request:
    paths:
      - "rag-backend/**"

jobs:
  eval:
    runs-on: ubuntu-latest
    env:
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
      DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      DAGSHUB_REPO: portfolio-rag
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: rag-backend/requirements.txt

      - name: Install dependencies
        run: pip install -r rag-backend/requirements.txt

      - name: Build index
        run: cd rag-backend && python pipeline/build_index.py

      - name: Run eval
        run: cd rag-backend && python eval/run_eval.py

      - name: Regression gate
        run: cd rag-backend && python eval/gate.py
