name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and build
        run: |
          npm ci
          npm run build

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add EC2 host to known hosts
        run: ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy frontend
        run: rsync -avz --delete .next/ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/portfolio/.next/

      - name: Deploy public assets
        run: rsync -avz public/ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/portfolio/public/

      - name: Deploy server.js
        run: scp .next/standalone/server.js ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/portfolio/server.js

      - name: Deploy rag-backend
        run: rsync -avz --exclude='venv' --exclude='__pycache__' --exclude='eval/eval_results.pkl' rag-backend/ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/portfolio/rag-backend/

      - name: Check if rag-backend changed
        id: rag-check
        run: |
          git diff --name-only HEAD~1 HEAD | grep '^rag-backend/' && echo "changed=true" >> $GITHUB_OUTPUT || echo "changed=false" >> $GITHUB_OUTPUT

      - name: Setup Python for index build
        if: steps.rag-check.outputs.changed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        if: steps.rag-check.outputs.changed == 'true'
        run: pip install -r rag-backend/requirements.txt

      - name: Build index
        if: steps.rag-check.outputs.changed == 'true'
        run: cd rag-backend && python build_index.py

      - name: Copy index to EC2
        if: steps.rag-check.outputs.changed == 'true'
        run: rsync -avz rag-backend/index.faiss rag-backend/chunks.pkl rag-backend/bm25.pkl ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/portfolio/rag-backend/

      - name: Reload services
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "pm2 reload portfolio && pm2 restart rag-backend && echo $(git rev-parse HEAD) > ~/portfolio/rag-backend/VERSION"
          sleep 40
