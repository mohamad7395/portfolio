name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and build
        working-directory: ai-engineer-portfolio
        run: |
          npm ci
          npm run build

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add EC2 host to known hosts
        run: ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy frontend
        working-directory: ai-engineer-portfolio
        run: rsync -avz --delete .next/standalone/ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/portfolio/

      - name: Deploy rag-backend
        run: rsync -avz --exclude='venv' --exclude='__pycache__' --exclude='eval/eval_results.pkl' rag-backend/ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/portfolio/rag-backend/

      - name: Reload services
        run: ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "pm2 reload all"
